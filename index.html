<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अंतिम क्विझ आव्हान</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    
</head>
<body>
    <div id="header"></div>
    
    <div class="main-content">
        <div class="quiz-container" id="quiz-container">
        <div id="home-screen" class="screen active">
            <h1>टेक क्विझ आव्हान</h1>
            <p>या 15 आव्हानात्मक प्रश्नांसह तुमचे टेक ज्ञान चाचणी करा!</p>
            <button id="start-btn" class="main-btn">क्विझ सुरू करा</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="progress">प्रश्न: <span id="current-q">1</span>/15</div>
                <div class="timer">उर्वरित वेळ: <span id="time-left">10</span>से</div>
            </div>
            
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="bar-fill"></div>
            </div>

            <h2 id="question-text">Question text goes here?</h2>
            
            <div id="options-container" class="options-grid">
                </div>

            <div class="quiz-footer">
                <button id="next-btn" class="main-btn" disabled>पुढचा प्रश्न</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h2><i class="fas fa-trophy"></i> क्विझ पूर्ण झाला!</h2>
            <div class="score-circle">
                <span id="final-score">0</span><span class="score-total">/15</span>
            </div>
            <p id="score-message"></p>
            <div class="stats">
                <span class="stat-correct"><i class="fas fa-check-circle"></i> बरोबर: <span id="stat-c">0</span></span>
                <span class="stat-wrong"><i class="fas fa-times-circle"></i> चूक: <span id="stat-w">0</span></span>
            </div>
            <div class="result-actions">
                <button id="review-btn" class="secondary-btn">उत्तरे तपासा</button>
                <button id="restart-btn" class="main-btn">क्विझ पुन्हा सुरू करा</button>
            </div>
        </div>

        <div id="review-screen" class="screen">
            <h2><i class="fas fa-list-check"></i> उत्तरे तपासा</h2>
            <div id="review-list"></div>
            <button id="back-to-result" class="secondary-btn"><i class="fas fa-arrow-left"></i> परत निकालाकडे</button>
        </div>
    </div>
    </div>

    <div id="footer"></div>

    <script src="script.js"></script>

      <script>
        // Efficient fetching
        async function loadLayout() {
            try {
                const headerData = await fetch("header.html").then(res => res.text());
                document.getElementById("header").innerHTML = headerData;
                
                const footerData = await fetch("footer.html").then(res => res.text());
                document.getElementById("footer").innerHTML = footerData;
            } catch (e) { console.error("Layout failed to load", e); }
        }
        loadLayout();
    </script>
</body>
</html>
